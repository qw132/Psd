<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لوحة الإدارة</title>
</head>
<body>
  <div id="app"></div>

  <script>

function initAdmin(){
  app.innerHTML=`<div class="card">
    <h2>لوحة تحكم المدرس</h2>
    <button onclick="showAdminSection('create')">إنشاء امتحان جديد</button>
    <button onclick="showAdminSection('results')">عرض النتائج</button>
    <div id="admin-content"></div></div>`;
  showAdminSection('create');
}

function showAdminSection(section){
  const content=document.getElementById('admin-content');
  if(section==='create'){
    content.innerHTML=`
      <div class="form-group"><label>اسم الامتحان</label><input id="adm-title"></div>
      <div class="form-group"><label>كود الامتحان</label><input id="adm-code"></div>
      <div class="form-group"><label>المدة بالدقائق</label><input type="number" id="adm-duration"></div>
      <button onclick="createAdminExam()">إنشاء الامتحان</button>`;
  } else if(section==='results'){
    const results=JSON.parse(localStorage.getItem('exam_results')||"[]");
    if(results.length===0){ content.innerHTML='<p>لا توجد نتائج بعد</p>'; return; }
    let table='<table border="1"><tr><th>الطالب</th><th>الهاتف</th><th>الامتحان</th><th>تاريخ</th></tr>';
    results.forEach(r=> table+=`<tr><td>${r.student.name}</td><td>${r.student.phone}</td><td>${r.examId}</td><td>${new Date(r.submittedAt).toLocaleString()}</td></tr>`);
    table+='</table>'; content.innerHTML=table;
  }
}

function createAdminExam(){
  const title=document.getElementById('adm-title').value.trim();
  const code=document.getElementById('adm-code').value.trim();
  const duration=document.getElementById('adm-duration').value.trim();
  if(!title||!code||!duration){alert('املأ جميع البيانات'); return;}
  examsData.push({id:'exam'+(examsData.length+1),title,code,duration,questions:[]});
  alert('تم إنشاء الامتحان'); showAdminSection('create');
}
</script>
</body>
</html>
